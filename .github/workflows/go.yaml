name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Build
      run: go build -v ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Run tests with coverage
        run: go test -race -timeout 5m -count=1 -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v -e '/examples' -e '/showcases')

  android:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Android binary
        run: |
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -o goclaw-android -ldflags="-s -w" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: goclaw-android
          path: goclaw-android
          retention-days: 30
