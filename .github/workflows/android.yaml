name: Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Go binary for Android
        run: |
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build \
            -o goclaw-android \
            -ldflags="-s -w" \
            .

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/smallnest/goclaw
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/jniLibs/arm64-v8a

          cp goclaw-android app/src/main/jniLibs/arm64-v8a/libgoclaw.so

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:label="GoClaw"
                  android:allowBackup="true"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/smallnest/goclaw/MainActivity.java << 'JAVAEOF'
          package com.smallnest.goclaw;
          import android.app.Activity;
          import android.os.Bundle;
          import android.util.Log;
          import android.widget.TextView;
          import android.widget.ScrollView;
          import android.widget.LinearLayout;
          public class MainActivity extends Activity {
              private static final String TAG = "GoClaw";
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(48, 48, 48, 48);
                  TextView title = new TextView(this);
                  title.setText("\uD83E\uDD9E GoClaw Android");
                  title.setTextSize(28);
                  layout.addView(title);
                  TextView status = new TextView(this);
                  status.setText("Loading...");
                  status.setTextSize(16);
                  status.setPadding(0, 32, 0, 0);
                  layout.addView(status);
                  ScrollView sv = new ScrollView(this);
                  sv.addView(layout);
                  setContentView(sv);
                  try {
                      System.loadLibrary("goclaw");
                      status.setText("Native library loaded!\nBinary ready.");
                      Log.i(TAG, "Loaded");
                  } catch (UnsatisfiedLinkError e) {
                      status.setText("Error: " + e.getMessage());
                      Log.e(TAG, "Load failed", e);
                  }
              }
          }
          JAVAEOF

          cat > settings.gradle << 'SETEOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GoClaw"
          include ':app'
          SETEOF

          cat > build.gradle << 'PROJEOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          PROJEOF

          cat > gradle.properties << 'GRPEOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          GRPEOF

          cat > app/build.gradle << 'APPEOF'
          plugins {
              id 'com.android.application'
          }
          repositories {
              google()
              mavenCentral()
          }
          android {
              compileSdk 34
              namespace 'com.smallnest.goclaw'
              defaultConfig {
                  applicationId 'com.smallnest.goclaw'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              sourceSets {
                  main {
                      java.srcDirs = ['src/main/java']
                  }
              }
          }
          dependencies {}
          APPEOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goclaw-android-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: goclaw-android-binary
          path: goclaw-android
          retention-days: 30
          if-no-files-found: warn
